<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yinreat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #1f1f28;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --text: #e8e6e0;
    --muted: #6b6a66;
    --user-bg: #1a1a22;
    --ai-bg: #111115;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--accent);
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4caf82;
    box-shadow: 0 0 8px #4caf8260;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-wrapper {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 32px;
    animation: fadeUp 0.35s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrapper + .msg-wrapper { margin-top: 28px; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .msg-label.user-label { color: var(--accent); opacity: 0.7; }

  .msg-bubble {
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14.5px;
    line-height: 1.75;
    border: 1px solid var(--border);
  }

  .msg-bubble.user {
    background: var(--user-bg);
    border-color: #25252f;
  }

  .msg-bubble.ai {
    background: var(--ai-bg);
    border-left: 2px solid var(--accent);
    border-radius: 2px 10px 10px 2px;
  }

  /* Welcome */
  .welcome {
    max-width: 760px;
    margin: 60px auto 0;
    padding: 0 32px;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }

  .welcome h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .welcome h1 span { color: var(--accent); }

  .welcome p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    max-width: 440px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 28px;
  }

  .suggestion {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Input */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 20px 32px 24px;
    flex-shrink: 0;
  }

  .input-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 13px 16px;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  button#send {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }

  button#send:hover { opacity: 0.85; transform: scale(1.04); }
  button#send:active { transform: scale(0.97); }
  button#send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  button#send svg { width: 18px; height: 18px; fill: #0d0d0f; }

  /* Thinking dots */
  .thinking {
    display: flex;
    gap: 5px;
    padding: 6px 0;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.3;
    animation: blink 1.2s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">Y</div>
    <span class="brand-name">Yinreat</span>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Hazır
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h1>Merhaba, <span>nasıl yardımcı olabilirim?</span></h1>
    <p>Kişisel asistanınım. Her konuda soru sorabilir, analiz isteyebilir ya da birlikte düşünebiliriz.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="fillInput(this)">Bugünkü planımı organize et</button>
      <button class="suggestion" onclick="fillInput(this)">Bir e-posta yaz</button>
      <button class="suggestion" onclick="fillInput(this)">Karar vermeme yardım et</button>
      <button class="suggestion" onclick="fillInput(this)">Bir konuyu açıkla</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <textarea id="input" placeholder="Yinreat'a mesajınızı yazın..." rows="1"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let history = [];

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function fillInput(btn) {
    input.value = btn.textContent;
    input.focus();
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper';

    const label = document.createElement('div');
    label.className = 'msg-label' + (role === 'user' ? ' user-label' : '');
    label.textContent = role === 'user' ? 'Siz' : 'Yinreat';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + role;

    if (content === '__thinking__') {
      const dots = document.createElement('div');
      dots.className = 'thinking';
      dots.innerHTML = '<span></span><span></span><span></span>';
      bubble.appendChild(dots);
      bubble.id = 'thinking-bubble';
    } else {
      bubble.innerHTML = content.replace(/\n/g, '<br>');
    }

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('ai', '__thinking__');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'Senin adın Yinreat. Çok resmi ve kurumsal bir yapay zeka asistansın. Türkçe yanıt ver. Hitap şekli olarak "Sayın Kullanıcı" gibi resmi ifadeler kullan. Cümleler eksiksiz ve düzgün kurulmuş olsun. "siz" zamiri ve saygılı üslup kullan. Kesinlikle argo, günlük dil veya samimi ifadeler kullanma. Yanıtlar net, düzenli ve kurumsal bir dille verilmeli.',
          messages: history
        })
      });

      const data = await response.json();
      const reply = data.content?.[0]?.text || 'Bir hata oluştu.';

      document.getElementById('thinking-bubble')?.parentElement?.remove();
      addMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      document.getElementById('thinking-bubble')?.parentElement?.remove();
      addMessage('ai', 'Bağlantı hatası oluştu. Lütfen tekrar deneyin.');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
